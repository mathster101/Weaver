services:
  controller:
    build: ./controller
    container_name: weaver-controller
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      weaver-net:
        ipv4_address: 192.168.1.1

  client1:
    build: ./client
    container_name: weaver-client1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      weaver-net:
        ipv4_address: 192.168.1.2

  client2:
    build: ./client
    container_name: weaver-client2
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      weaver-net:
        ipv4_address: 192.168.1.3

networks:
  weaver-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.254
